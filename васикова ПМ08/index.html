<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Пассажирам.РФ</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Пассажирам.РФ</h1>
            <p>Обучение перевозкам: автобус, электробус, трамвай</p>
        </header>

        <main>
            <section class="auth-form">
                <h2>Вход в систему</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login">Логин</label>
                        <input type="text" id="login" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" required>
                    </div>
                    <div id="loginError" class="error-message" style="display: none;">Неверный логин или пароль</div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </form>
                <p class="auth-switch">Ещё не зарегистрированы? <a href="assets/pages/register.html">Регистрация</a></p>
            </section>
        </main>

        <footer>
            <p>© 2026 Пассажирам.РФ</p>
        </footer>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
