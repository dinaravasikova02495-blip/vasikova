<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Пассажирам.РФ — Регистрация</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="assets/img/logo.svg" alt="Пассажирам.РФ" class="logo-img">
                <span class="logo-text">Пассажирам.РФ</span>
            </div>
            <nav class="nav">
                <a href="assets/login.html" class="nav-link">Вход</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="registration">
                <h1>Регистрация</h1>
                <form id="registerForm" class="form" novalidate>
                    <div class="form-group">
                        <label for="login">Логин (латиница, цифры, мин. 6 симв.)</label>
                        <input type="text" id="login" name="login" placeholder="Введите логин" required pattern="[A-Za-z0-9]{6,}">
                        <span class="error-hint" id="loginError"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль (мин. 8 симв.)</label>
                        <input type="password" id="password" name="password" placeholder="Введите пароль" required minlength="8">
                        <span class="error-hint" id="passwordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ФИО</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Иванов Иван Иванович" required>
                        <span class="error-hint" id="fullnameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">Дата рождения</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                        <span class="error-hint" id="birthdateError"></span>
                    </div>
                    <div class="form-group">
                        <label for="phone">Контактный телефон</label>
                        <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>
                        <span class="error-hint" id="phoneError"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
                        <span class="error-hint" id="emailError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                </form>
                <div class="auth-switch">
                    <span>Уже есть аккаунт? </span>
                    <a href="assets/login.html" class="switch-link">Войти</a>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-contacts">
                <p>📍 г. Москва, ул. Большая Ордынка, д. 15</p>
                <p>📞 +7 (495) 123-45-67</p>
            </div>
            <div class="footer-payment">
                <span>Оплата: </span>
                <span>QR-код, карта МИР, постоплата в офисе</span>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
