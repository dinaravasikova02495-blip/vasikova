<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Пассажирам.РФ — Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="img/logo.svg" alt="Пассажирам.РФ" class="logo-img">
                <span class="logo-text">Пассажирам.РФ</span>
            </div>
            <nav class="nav">
                <a href="../index.html" class="nav-link">Регистрация</a>
                <a href="login.html" class="nav-link active">Вход</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="login">
                <h1>Вход в систему</h1>
                <form id="loginForm" class="form" novalidate>
                    <div class="form-group">
                        <label for="loginUser">Логин</label>
                        <input type="text" id="loginUser" name="loginUser" placeholder="Введите логин" required>
                        <span class="error-hint" id="loginUserError"></span>
                    </div>
                    <div class="form-group">
                        <label for="passwordUser">Пароль</label>
                        <input type="password" id="passwordUser" name="passwordUser" placeholder="Введите пароль" required>
                        <span class="error-hint" id="passwordUserError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </form>
                <div class="auth-switch">
                    <span>Еще не зарегистрированы? </span>
                    <a href="../index.html" class="switch-link">Регистрация</a>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-contacts">
                <p>📍 г. Москва, ул. Большая Ордынка, д. 15</p>
                <p>📞 +7 (495) 123-45-67</p>
            </div>
            <div class="footer-payment">
                <span>Оплата: </span>
                <span>QR-код, карта МИР, постоплата в офисе</span>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
