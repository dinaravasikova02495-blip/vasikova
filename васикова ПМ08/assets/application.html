<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Пассажирам.РФ — Новая заявка</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="img/logo.svg" alt="Пассажирам.РФ" class="logo-img">
                <span class="logo-text">Пассажирам.РФ</span>
            </div>
            <nav class="nav">
                <a href="dashboard.html" class="nav-link">Личный кабинет</a>
                <a href="application.html" class="nav-link active">Новая заявка</a>
                <a href="../index.html" class="nav-link" id="logoutBtn2">Выйти</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="application">
                <h1>Оформление заявки на обучение</h1>
                <form id="applicationForm" class="form">
                    <div class="form-group">
                        <label for="transportType">Вид транспорта</label>
                        <select id="transportType" required>
                            <option value="">Выберите...</option>
                            <option value="Автобус">Автобус</option>
                            <option value="Электробус">Электробус</option>
                            <option value="Трамвай">Трамвай</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startDate">Дата начала (ДД.ММ.ГГГГ)</label>
                        <input type="text" id="startDate" placeholder="01.01.2026" required pattern="\d{2}\.\d{2}\.\d{4}">
                        <span class="error-hint" id="dateError"></span>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Способ оплаты</label>
                        <select id="paymentMethod" required>
                            <option value="">Выберите...</option>
                            <option value="QR-код">Предоплата по QR-коду</option>
                            <option value="МИР">Оплата картой МИР</option>
                            <option value="Постоплата">Постоплата в офисе</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить заявку</button>
                </form>
                <div id="appStatus" class="app-status"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-contacts">
                <p>📍 г. Москва, ул. Большая Ордынка, д. 15</p>
                <p>📞 +7 (495) 123-45-67</p>
            </div>
            <div class="footer-payment">
                <span>Оплата: </span>
                <span>QR-код, карта МИР, постоплата в офисе</span>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
