<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заявки — Пассажирам.РФ</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Пассажирам.РФ</h1>
            <p>Обучение перевозкам: автобус, электробус, трамвай</p>
            <nav class="user-nav">
                <span>Добро пожаловать, <strong id="userNameApp">Пользователь</strong>!</span>
                <a href="dashboard.html" class="btn btn-outline">Личный кабинет</a>
                <a href="../../index.html" class="btn btn-outline" id="logoutBtnApp">Выйти</a>
            </nav>
        </header>

        <main>
            <section class="application-form">
                <h2>Оформление заявки на обучение</h2>
                <form id="applicationForm">
                    <div class="form-group">
                        <label for="transportType">Вид транспорта</label>
                        <select id="transportType" required>
                            <option value="">— выберите —</option>
                            <option value="Автобус">Автобус</option>
                            <option value="Электробус">Электробус</option>
                            <option value="Трамвай">Трамвай</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startDate">Дата начала обучения (ДД.ММ.ГГГГ)</label>
                        <input type="text" id="startDate" placeholder="ДД.ММ.ГГГГ" required>
                    </div>
                    <div class="form-group">
                        <label for="paymentMethod">Способ оплаты</label>
                        <select id="paymentMethod" required>
                            <option value="">— выберите —</option>
                            <option value="Предоплата по QR-коду">Предоплата по QR-коду</option>
                            <option value="Оплата картой МИР">Оплата картой МИР</option>
                            <option value="Постоплата в офисе">Постоплата в офисе</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить заявку</button>
                </form>
                <div id="appMessage" class="success-message" style="display: none;">Заявка успешно отправлена!</div>
            </section>
        </main>

        <footer>
            <p>© 2026 Пассажирам.РФ</p>
            <p>г. Москва, ул. Большая Ордынка, д. 15 | Телефон: +7 (495) 123-45-67</p>
        </footer>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
